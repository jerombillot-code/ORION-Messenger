<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION Messenger</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{--bg:#070b12;--bg2:#0c1220;--bg3:#111a2e;--border:#1e3358;--accent:#00d4ff;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#4a6080;--mono:'Courier New',monospace;--sans:system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;gap:10px;flex-wrap:wrap;}
.nav-logo{font-family:var(--mono);font-size:16px;letter-spacing:5px;color:var(--accent);}
.nav-mid{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;}
.room-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 12px;border-radius:6px;width:160px;text-align:center;letter-spacing:2px;text-transform:uppercase;}
.room-input:focus{outline:none;border-color:var(--accent);}
.join-btn{background:var(--accent);border:none;color:#000;font-family:var(--mono);font-size:10px;letter-spacing:2px;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:700;}
.join-btn:active{opacity:.85;}
.net-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px;white-space:nowrap;}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.ndot.green{background:var(--green);animation:blink 2s infinite;}
.ndot.amber{background:var(--amber);}
.ndot.red{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0;}
.sb-head{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-head h2{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.my-id-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;}
.my-id-label{font-size:8px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:3px;}
.my-id-val{font-family:var(--mono);font-size:9px;color:var(--accent);word-break:break-all;line-height:1.5;}
.peers-head{padding:10px 14px 6px;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.peers-list{flex:1;overflow-y:auto;}
.peer-item{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(30,51,88,.4);cursor:pointer;transition:background .15s;}
.peer-item:hover,.peer-item.active{background:var(--bg3);}
.peer-item.active{border-left:2px solid var(--accent);}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;flex-shrink:0;border:1px solid;background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.3);color:#a78bfa;}
.peer-info{flex:1;min-width:0;}
.peer-name{font-size:12px;font-weight:500;}
.peer-sub{font-size:9px;color:var(--muted);font-family:var(--mono);}
.unread-badge{background:var(--accent);color:#000;font-size:8px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sb-info{padding:10px 14px;border-top:1px solid var(--border);font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.8;word-break:break-all;}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;}
.chat-header-info{flex:1;min-width:0;}
.chat-header-name{font-size:13px;font-weight:600;}
.chat-header-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.sys{text-align:center;font-size:10px;color:var(--muted);font-family:var(--mono);padding:4px 0;}
.bwrap{display:flex;flex-direction:column;max-width:70%;}
.bwrap.me{align-self:flex-end;align-items:flex-end;}
.bwrap.them{align-self:flex-start;}
.bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word;}
.bwrap.me .bubble{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-bottom-right-radius:3px;}
.bwrap.them .bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:3px;}
.bmeta{font-size:9px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px;font-family:var(--mono);}
.chip{font-size:8px;padding:1px 5px;border-radius:3px;}
.chip.ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.chip.bad{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.chip.p2p{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.2);}
.tick{color:var(--green);}
.chat-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg2);flex-shrink:0;}
.chat-input textarea{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 14px;border-radius:10px;resize:none;line-height:1.5;max-height:120px;}
.chat-input textarea:focus{outline:none;border-color:var(--accent);}
.send{background:var(--accent);border:none;color:#000;width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;flex-shrink:0;}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;}
.welcome-logo{font-family:var(--mono);font-size:36px;color:var(--accent);letter-spacing:8px;opacity:.5;}
.welcome h2{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--muted);}
.step{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;width:100%;max-width:340px;}
.step-n{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:4px;}
.step-t{font-size:12px;line-height:1.7;color:var(--text);}
.step-t b{color:var(--accent);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:560px){.sidebar{width:180px;}.room-input{width:110px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">◈ ORION</div>
  <div class="nav-mid">
    <input class="room-input" id="room-input" placeholder="CODE ROOM" maxlength="16"
      onkeydown="if(event.key==='Enter')joinRoom()"/>
    <button class="join-btn" onclick="joinRoom()">REJOINDRE</button>
  </div>
  <div class="net-pill">
    <div class="ndot" id="net-dot"></div>
    <span id="net-txt">Connexion…</span>
  </div>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <h2>Mon identité</h2>
      <div class="my-id-box">
        <span class="my-id-label">MON PEER ID</span>
        <div class="my-id-val" id="my-peer-display">génération…</div>
      </div>
    </div>
    <div class="peers-head">Pairs connectés</div>
    <div class="peers-list" id="peers-list">
      <div style="padding:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.8;">Rejoins une room<br>pour voir les pairs</div>
    </div>
    <div class="sb-info" id="sb-info">◈ Prêt</div>
  </div>
  <div class="chat" id="chat-area">
    <div class="welcome">
      <div class="welcome-logo">◈</div>
      <h2>ORION MESSENGER</h2>
      <div class="step"><div class="step-n">ÉTAPE 1</div><div class="step-t">Entre un <b>code room</b> et clique <b>REJOINDRE</b>.</div></div>
      <div class="step"><div class="step-n">ÉTAPE 2</div><div class="step-t">Partage le lien à ton contact :<br><span id="share-link" style="color:var(--accent);font-family:var(--mono);font-size:10px;">Entre un code room…</span></div></div>
      <div class="step"><div class="step-n">ÉTAPE 3</div><div class="step-t">Quand il rejoint → <b>clique son nom</b> → écris.</div></div>
    </div>
  </div>
</div>
<script>
/* ═══════════════════════════════════════════════════════
   ORION Messenger — système simplifié et robuste
   
   Principe : chaque pair tente de se connecter au peer
   fixe "orion-room-CODE" (le coordinateur).
   Le premier devient coordinateur, les suivants le contactent.
   Le coordinateur maintient la liste et connecte tout le monde.
   Les messages passent en DataChannel P2P direct.
   ═══════════════════════════════════════════════════════ */

let myPeer   = null;
let myId     = null;
let myNode   = null;
let roomId   = null;
let activePid= null;
let peers    = new Map(); // pid -> {conn, name, pub, msgs[], online, unread}
let msgCount = 0;

// Coord
let coordId   = null;
let coordPeer = null; // notre Peer coord (si on est coord)
let coordConn = null; // notre conn vers le coord (si on est membre)
let isCoord   = false;
let members   = [];   // liste des IDs dans la room (maintenu par le coord)
let joining   = false;

/* ── INIT ── */
async function init() {
  myNode = await makeNode();
  const sid = Math.random().toString(36).substring(2, 8);
  myId = 'o-' + sid;

  myPeer = new Peer(myId, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]}
  });

  myPeer.on('open', id => {
    myId = id;
    document.getElementById('my-peer-display').textContent = id;
    setNet('green', 'Connecté — entre un code room');
    // rejoindre room depuis URL
    const r = new URLSearchParams(location.search).get('room');
    if (r) { document.getElementById('room-input').value = r.toUpperCase(); joinRoom(); }
  });

  myPeer.on('connection', conn => {
    // Connexion entrante — pair qui nous contacte directement
    handleIncoming(conn);
  });

  myPeer.on('error', e => {
    if (e.type === 'unavailable-id') { myId = 'o-' + Math.random().toString(36).substring(2,8); myPeer.id = myId; }
    else setNet('red', 'Erreur: ' + e.type);
  });

  myPeer.on('disconnected', () => {
    setNet('amber', 'Reconnexion…');
    setTimeout(() => { try { myPeer.reconnect(); } catch(e) {} }, 2000);
  });
}

/* ── ROOM ── */
function joinRoom() {
  const val = document.getElementById('room-input').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if (!val || val.length < 2) { alert('Code trop court'); return; }
  if (!myId) { setTimeout(joinRoom, 500); return; }
  roomId  = val;
  coordId = 'orion-' + val.toLowerCase();
  history.replaceState({}, '', '?room=' + val);
  document.getElementById('share-link').textContent = location.href;
  setNet('amber', 'Connexion room ' + val + '…');
  joining = true;
  attemptJoin();
}

function attemptJoin() {
  // Tenter de se connecter au coordinateur
  const c = myPeer.connect(coordId, { reliable: true });
  let opened = false;

  c.on('open', () => {
    opened = true;
    coordConn = c;
    isCoord = false;
    setNet('green', 'Room ' + roomId + ' rejointe');
    // Demander la liste des membres
    c.send(JSON.stringify({ type: 'hello', from: myId }));
    c.on('data', raw => onCoordMsg(raw));
    c.on('close', () => {
      coordConn = null;
      setNet('amber', 'Coord déco — reprise…');
      setTimeout(attemptJoin, 1500);
    });
  });

  c.on('error', () => { if (!opened) becomeCoord(); });
  setTimeout(() => { if (!opened && joining) becomeCoord(); }, 3000);
}

function becomeCoord() {
  if (isCoord || coordPeer) return;
  isCoord = true;
  members = [myId];

  coordPeer = new Peer(coordId, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true,
    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
  });

  coordPeer.on('open', () => {
    setNet('green', 'Room ' + roomId + ' créée — en attente');
    updateSbInfo();
  });

  coordPeer.on('connection', conn => {
    // Un membre se connecte au coord
    conn.on('open', () => {});
    conn.on('data', raw => {
      try {
        const d = JSON.parse(raw);
        if (d.type === 'hello' && d.from) {
          const newPid = d.from;
          if (!members.includes(newPid)) {
            // Envoyer la liste AVANT d'ajouter le nouveau
            const existing = members.filter(id => id !== myId);
            conn.send(JSON.stringify({ type: 'members', list: existing, you: newPid }));
            // Dire aux membres existants qu'un nouveau arrive
            members.forEach(mid => {
              if (mid !== myId && mid !== newPid) {
                const p = peers.get(mid);
                if (p && p.conn && p.conn.open) {
                  p.conn.send(JSON.stringify({ type: 'new-peer', pid: newPid }));
                }
              }
            });
            members.push(newPid);
            // Le coord se connecte aussi au nouveau membre
            connectTo(newPid);
          } else {
            // Reconnnexion — renvoyer la liste
            const existing = members.filter(id => id !== newPid);
            conn.send(JSON.stringify({ type: 'members', list: existing, you: newPid }));
          }
        }
      } catch(e) {}
    });
    conn.on('close', () => {
      // Retirer le membre de la liste (on ne sait pas qui c'est depuis cette conn)
    });
  });

  coordPeer.on('error', e => {
    if (e.type === 'unavailable-id') {
      // Quelqu'un d'autre vient de créer — rejoindre
      isCoord = false; coordPeer = null;
      setTimeout(attemptJoin, 300);
    }
  });
}

function onCoordMsg(raw) {
  try {
    const d = JSON.parse(raw);
    if (d.type === 'members') {
      // Se connecter à tous les membres existants
      (d.list || []).forEach(pid => { if (pid !== myId) connectTo(pid); });
    }
    if (d.type === 'new-peer' && d.pid && d.pid !== myId) {
      connectTo(d.pid);
    }
  } catch(e) {}
}

/* ── CONNEXIONS P2P ── */
function connectTo(pid) {
  if (!pid || pid === myId) return;
  const ex = peers.get(pid);
  if (ex && ex.online) return; // déjà connecté
  if (!ex) peers.set(pid, mkPeer(pid));
  const conn = myPeer.connect(pid, { reliable: true });
  attachConn(pid, conn);
}

function handleIncoming(conn) {
  const pid = conn.peer;
  if (!peers.has(pid)) peers.set(pid, mkPeer(pid));
  // Si on a déjà une connexion ouverte et notre ID est plus petit → ignorer la doublon
  const ex = peers.get(pid);
  if (ex.conn && ex.conn.open && myId < pid) { conn.close(); return; }
  attachConn(pid, conn);
}

function mkPeer(pid) {
  return { conn: null, name: 'Pair·' + pid.substring(0, 6), pub: '', msgs: [], online: false, unread: 0 };
}

function attachConn(pid, conn) {
  const p = peers.get(pid); if (!p) return;
  p.conn = conn;

  conn.on('open', () => {
    p.online = true;
    // Handshake
    conn.send(JSON.stringify({ type: 'hi', pub: myNode.pub, name: 'Pair·' + myId.substring(0,6) }));
    renderPeersList();
    if (activePid === pid) renderChatHeader(pid);
    sysMsg(pid, '🔗 Connexion P2P établie');
    setNet('green', 'Room ' + roomId + ' · ' + countOnline() + ' pair(s)');
    updateSbInfo();
    // Ouvrir le chat automatiquement si c'est le premier pair
    if (peers.size === 1 && !activePid) openChat(pid);
  });

  conn.on('data', raw => onData(pid, raw));

  conn.on('close', () => {
    p.online = false; p.conn = null;
    renderPeersList();
    if (activePid === pid) renderChatHeader(pid);
    sysMsg(pid, '⚠ Déconnecté — reconnexion…');
    setNet('amber', 'Room ' + roomId + ' · pair déco');
    updateSbInfo();
    setTimeout(() => { const pp = peers.get(pid); if (pp && !pp.online) connectTo(pid); }, 3000);
  });

  conn.on('error', () => { const pp = peers.get(pid); if (pp) { pp.online = false; pp.conn = null; } renderPeersList(); });
}

/* ── DONNÉES ── */
async function onData(pid, raw) {
  let d; try { d = JSON.parse(raw); } catch(e) { return; }
  const p = peers.get(pid); if (!p) return;

  if (d.type === 'hi') {
    p.pub  = d.pub  || '';
    p.name = d.name || p.name;
    renderPeersList();
    if (activePid === pid) renderChatHeader(pid);
    return;
  }
  if (d.type === 'new-peer' && d.pid) { connectTo(d.pid); return; }
  if (d.type === 'msg') {
    const valid = await verify(d, p.pub);
    const msg = { from: 'them', text: d.text, ts: d.ts || Date.now(), valid };
    p.msgs.push(msg); msgCount++;
    if (activePid !== pid) { p.unread++; renderPeersList(); }
    else { appendMsg(msg); scrollBottom(); }
    updateSbInfo();
  }
}

/* ── ENVOYER ── */
async function sendMessage() {
  if (!activePid) return;
  const ta = document.getElementById('msg-input'); if (!ta) return;
  const text = ta.value.trim(); if (!text) return;
  ta.value = ''; ta.style.height = 'auto';
  const p = peers.get(activePid);
  if (!p || !p.conn || !p.conn.open) { sysMsg(activePid, '⚠ Canal fermé'); return; }
  const sig = await sign(text);
  p.conn.send(JSON.stringify({ type: 'msg', text, ts: Date.now(), sig }));
  const msg = { from: 'me', text, ts: Date.now(), valid: true };
  p.msgs.push(msg); msgCount++;
  appendMsg(msg); scrollBottom(); updateSbInfo();
}

/* ── CRYPTO ── */
async function makeNode() {
  try {
    const kp = await crypto.subtle.generateKey({ name: 'Ed25519' }, true, ['sign', 'verify']);
    const raw = await crypto.subtle.exportKey('raw', kp.publicKey);
    return { kp, pub: h(raw), fb: false };
  } catch(e) { return { fb: true, pub: h(crypto.getRandomValues(new Uint8Array(32))) }; }
}
async function sign(text) {
  if (myNode.fb) return h(crypto.getRandomValues(new Uint8Array(32)));
  try { return h(await crypto.subtle.sign({ name: 'Ed25519' }, myNode.kp.privateKey, enc(text))); }
  catch(e) { return h(crypto.getRandomValues(new Uint8Array(32))); }
}
async function verify(d, pub) {
  if (!pub || !d.sig || myNode.fb) return true;
  try {
    const k = await crypto.subtle.importKey('raw', dh(pub), { name: 'Ed25519' }, false, ['verify']);
    return await crypto.subtle.verify({ name: 'Ed25519' }, k, dh(d.sig), enc(d.text));
  } catch(e) { return false; }
}

/* ── RENDER ── */
function openChat(pid) {
  activePid = pid;
  const p = peers.get(pid); if (!p) return;
  p.unread = 0; renderPeersList();
  document.getElementById('chat-area').innerHTML = `
    <div class="chat-header">
      <div class="avatar">${p.name.substring(0,2).toUpperCase()}</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="ch-name">${esc(p.name)}</div>
        <div class="chat-header-sub" id="ch-sub">…</div>
      </div>
    </div>
    <div class="messages" id="msg-list"><div class="sys">Canal P2P · Ed25519</div></div>
    <div class="chat-input">
      <textarea id="msg-input" placeholder="Message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send" onclick="sendMessage()">➤</button>
    </div>`;
  p.msgs.forEach(m => appendMsg(m));
  scrollBottom(); renderChatHeader(pid);
  document.getElementById('msg-input').focus();
}

function renderChatHeader(pid) {
  const p = peers.get(pid);
  const n = document.getElementById('ch-name'), s = document.getElementById('ch-sub');
  if (!n || !s || !p) return;
  n.textContent = p.name;
  s.textContent = p.online ? '● P2P · ' + (p.pub ? p.pub.substring(0,14)+'…' : '…') : '○ hors ligne';
}
function appendMsg(msg) {
  const el = document.getElementById('msg-list'); if (!el) return;
  const isMe = msg.from === 'me';
  const d = document.createElement('div'); d.className = 'bwrap ' + (isMe ? 'me' : 'them');
  d.innerHTML = `<div class="bubble">${esc(msg.text)}</div>
    <div class="bmeta"><span>${ft(msg.ts)}</span>${isMe?'<span class="tick">✓✓</span>':''}
    <span class="chip ${msg.valid===false?'bad':'ok'}">${msg.valid===false?'⚠':'✓'} sig</span>
    <span class="chip p2p">P2P</span></div>`;
  el.appendChild(d);
}
function sysMsg(pid, text) {
  if (activePid !== pid) return;
  const el = document.getElementById('msg-list'); if (!el) return;
  const d = document.createElement('div'); d.className = 'sys'; d.textContent = text;
  el.appendChild(d); scrollBottom();
}
function scrollBottom() { const e = document.getElementById('msg-list'); if (e) e.scrollTop = e.scrollHeight; }
function renderPeersList() {
  const el = document.getElementById('peers-list');
  if (peers.size === 0) {
    el.innerHTML = `<div style="padding:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.8;">${roomId?'En attente<br>room '+roomId:'Rejoins une room'}</div>`;
    return;
  }
  el.innerHTML = '';
  for (const [pid, p] of peers) {
    const last = p.msgs[p.msgs.length-1];
    el.innerHTML += `<div class="peer-item ${activePid===pid?'active':''}" onclick="openChat('${esc(pid)}')">
      <div class="avatar">${p.name.substring(0,2).toUpperCase()}</div>
      <div class="peer-info"><div class="peer-name">${esc(p.name)}</div>
      <div class="peer-sub">${p.online?'● en ligne':'○ hors ligne'}${last?' · '+esc(last.text.substring(0,14)):''}</div></div>
      ${p.unread?`<div class="unread-badge">${p.unread}</div>`:''}</div>`;
  }
}
function updateSbInfo() {
  document.getElementById('sb-info').innerHTML =
    `Room : ${roomId||'—'}<br>Pairs : ${peers.size} (${countOnline()} en ligne)<br>Msgs : ${msgCount}`;
}
function countOnline() { let n=0; for(const p of peers.values()) if(p.online) n++; return n; }
function setNet(s, t) {
  const d = document.getElementById('net-dot');
  d.className = 'ndot'+(s==='green'?' green':s==='amber'?' amber':s==='red'?' red':'');
  document.getElementById('net-txt').textContent = t;
}
/* ── UTILS ── */
function enc(s) { return new TextEncoder().encode(s); }
function h(b) { return Array.from(new Uint8Array(b instanceof ArrayBuffer?b:b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
function dh(s) { const b=new Uint8Array(s.length/2); for(let i=0;i<s.length;i+=2)b[i/2]=parseInt(s.substr(i,2),16); return b.buffer; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ft(ts) { const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
init();
</script>
