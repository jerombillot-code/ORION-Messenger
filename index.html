<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORION Messenger</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#0d0015;
  --bg2:#120020;
  --bg3:#1a0030;
  --border:rgba(180,0,255,0.15);
  --p1:#b800ff;--p2:#ff2d8f;--p3:#ff6bcd;
  --g1:#7000ff;--g2:#b800ff;
  --green:#00ffb3;--red:#ff3b6b;--amber:#ffb800;
  --text:#f0e6ff;--muted:#8a6aaa;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;position:relative;}

/* Animated background */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%, rgba(112,0,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 80% 80%, rgba(255,45,143,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 60% 10%, rgba(184,0,255,0.08) 0%, transparent 70%);
  pointer-events:none;
}
body>*{position:relative;z-index:1;}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;flex-shrink:0;gap:10px;flex-wrap:wrap;
  background:rgba(18,0,32,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:var(--sans);font-size:18px;font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(135deg, var(--p1), var(--p2), var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 12px rgba(184,0,255,0.6));
}
.nav-mid{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;}
.room-input{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(180,0,255,0.3);
  color:var(--text);font-family:var(--sans);font-size:13px;font-weight:600;
  padding:8px 14px;border-radius:50px;width:160px;text-align:center;
  letter-spacing:3px;text-transform:uppercase;
  transition:all .2s;
}
.room-input:focus{outline:none;border-color:var(--p1);background:rgba(184,0,255,0.08);box-shadow:0 0 20px rgba(184,0,255,0.2);}
.room-input::placeholder{color:var(--muted);letter-spacing:2px;}
.join-btn{
  background:linear-gradient(135deg, var(--g1), var(--p2));
  border:none;color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;
  letter-spacing:1px;padding:8px 18px;border-radius:50px;cursor:pointer;
  box-shadow:0 4px 20px rgba(184,0,255,0.4);
  transition:all .2s;white-space:nowrap;
}
.join-btn:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(184,0,255,0.5);}
.join-btn:active{transform:translateY(0);}
.net-pill{
  display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;color:var(--muted);
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  padding:5px 12px;border-radius:50px;white-space:nowrap;
}
.ndot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.ndot.green{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
.ndot.amber{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.ndot.red{background:var(--red);box-shadow:0 0 8px var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  background:rgba(18,0,32,0.6);backdrop-filter:blur(20px);
  flex-shrink:0;
}
.sb-head{padding:14px;border-bottom:1px solid var(--border);}
.sb-head h2{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.my-id-box{
  background:rgba(184,0,255,0.08);border:1px solid rgba(184,0,255,0.2);
  border-radius:12px;padding:10px 12px;
}
.my-id-label{font-size:8px;font-weight:700;color:var(--p3);letter-spacing:2px;display:block;margin-bottom:4px;text-transform:uppercase;}
.my-id-val{font-family:var(--mono);font-size:9px;color:rgba(240,230,255,0.7);word-break:break-all;line-height:1.5;}
.peers-head{padding:10px 14px 6px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.peers-list{flex:1;overflow-y:auto;padding:6px 0;}

.peer-item{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(180,0,255,0.06);cursor:pointer;
  transition:all .15s;position:relative;
}
.peer-item:hover{background:rgba(184,0,255,0.08);}
.peer-item.active{background:rgba(184,0,255,0.12);border-left:2px solid var(--p1);}

.avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
  background:linear-gradient(135deg, rgba(112,0,255,0.3), rgba(255,45,143,0.3));
  border:1px solid rgba(184,0,255,0.4);color:var(--p3);
}
.peer-info{flex:1;min-width:0;}
.peer-name{font-size:12px;font-weight:600;margin-bottom:2px;}
.peer-sub{font-size:10px;color:var(--muted);}
.unread-badge{
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;font-size:9px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
  box-shadow:0 2px 8px rgba(184,0,255,0.5);
}
.sb-info{padding:10px 14px;border-top:1px solid var(--border);font-size:9px;color:var(--muted);font-family:var(--mono);line-height:1.8;word-break:break-all;}

/* ── CHAT ── */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Welcome */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:32px;text-align:center;
}
.welcome-logo{
  font-size:48px;font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg, var(--p1), var(--p2), var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(184,0,255,0.5));
  animation:pulse-logo 3s ease-in-out infinite;
}
@keyframes pulse-logo{0%,100%{filter:drop-shadow(0 0 20px rgba(184,0,255,0.4))}50%{filter:drop-shadow(0 0 40px rgba(255,45,143,0.6))}}
.welcome h2{font-size:14px;font-weight:800;letter-spacing:4px;color:var(--muted);text-transform:uppercase;}
.step{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(184,0,255,0.15);
  border-radius:16px;padding:14px 18px;width:100%;max-width:340px;
  backdrop-filter:blur(10px);
  transition:border-color .2s;
}
.step:hover{border-color:rgba(184,0,255,0.3);}
.step-n{font-size:9px;font-weight:700;color:var(--p3);letter-spacing:2px;margin-bottom:4px;text-transform:uppercase;}
.step-t{font-size:12px;line-height:1.7;color:var(--text);}
.step-t b{color:var(--p3);}

/* Chat header */
.chat-header{
  padding:12px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  background:rgba(18,0,32,0.7);backdrop-filter:blur(20px);flex-shrink:0;
}
.chat-header-info{flex:1;min-width:0;}
.chat-header-name{font-size:14px;font-weight:700;}
.chat-header-sub{font-size:10px;color:var(--muted);font-weight:500;}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;}
.sys{
  text-align:center;font-size:10px;font-weight:600;color:var(--muted);
  padding:6px 14px;background:rgba(255,255,255,0.03);border-radius:50px;
  border:1px solid var(--border);align-self:center;
}
.bwrap{display:flex;flex-direction:column;max-width:72%;}
.bwrap.me{align-self:flex-end;align-items:flex-end;}
.bwrap.them{align-self:flex-start;align-items:flex-start;}

.bubble{
  padding:10px 16px;border-radius:18px;font-size:14px;line-height:1.6;
  word-break:break-word;font-weight:500;
}
.bwrap.me .bubble{
  background:linear-gradient(135deg, var(--g1), var(--p2));
  color:#fff;border-bottom-right-radius:4px;
  box-shadow:0 4px 20px rgba(184,0,255,0.3);
}
.bwrap.them .bubble{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(184,0,255,0.15);
  color:var(--text);border-bottom-left-radius:4px;
  backdrop-filter:blur(10px);
}
.bmeta{
  font-size:9px;color:var(--muted);margin-top:4px;
  display:flex;align-items:center;gap:5px;font-weight:600;
}
.chip{font-size:8px;padding:2px 7px;border-radius:50px;font-weight:700;}
.chip.ok{background:rgba(0,255,179,0.12);color:var(--green);border:1px solid rgba(0,255,179,0.25);}
.chip.bad{background:rgba(255,59,107,0.12);color:var(--red);border:1px solid rgba(255,59,107,0.25);}
.chip.p2p{
  background:linear-gradient(135deg,rgba(112,0,255,0.15),rgba(255,45,143,0.15));
  color:var(--p3);border:1px solid rgba(184,0,255,0.25);
}
.tick{color:var(--green);font-size:11px;}

/* Input */
.chat-input{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-end;
  background:rgba(18,0,32,0.8);backdrop-filter:blur(20px);flex-shrink:0;
}
.chat-input textarea{
  flex:1;background:rgba(255,255,255,0.05);
  border:1px solid rgba(184,0,255,0.25);
  color:var(--text);font-family:var(--sans);font-size:14px;font-weight:500;
  padding:10px 16px;border-radius:24px;resize:none;line-height:1.5;max-height:120px;
  transition:all .2s;
}
.chat-input textarea:focus{
  outline:none;border-color:var(--p1);
  background:rgba(184,0,255,0.08);
  box-shadow:0 0 20px rgba(184,0,255,0.15);
}
.chat-input textarea::placeholder{color:var(--muted);}
.send{
  background:linear-gradient(135deg,var(--g1),var(--p2));
  border:none;color:#fff;width:44px;height:44px;border-radius:50%;
  font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(184,0,255,0.4);
  transition:all .2s;
}
.send:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(184,0,255,0.5);}
.send:active{transform:scale(0.95);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(184,0,255,0.3);border-radius:2px;}

/* Message animation */
.bwrap{animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media(max-width:560px){.sidebar{width:180px;}.room-input{width:110px;}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">◈ ORION</div>
  <div class="nav-mid">
    <input class="room-input" id="room-input" placeholder="# ROOM" maxlength="16"
      onkeydown="if(event.key==='Enter')joinRoom()"/>
    <button class="join-btn" onclick="joinRoom()">JOIN 🚀</button>
  </div>
  <div class="net-pill">
    <div class="ndot" id="net-dot"></div>
    <span id="net-txt">…</span>
  </div>
</nav>
<div class="layout">
  <div class="sidebar">
    <div class="sb-head">
      <h2>Mon profil</h2>
      <div class="my-id-box">
        <span class="my-id-label">Mon ID</span>
        <div class="my-id-val" id="my-peer-display">génération…</div>
      </div>
    </div>
    <div class="peers-head">💜 Connectés</div>
    <div class="peers-list" id="peers-list">
      <div style="padding:16px;font-size:11px;color:var(--muted);text-align:center;line-height:2;">
        Rejoins une room<br>pour chatter 🔥
      </div>
    </div>
    <div class="sb-info" id="sb-info">◈ Prêt</div>
  </div>
  <div class="chat" id="chat-area">
    <div class="welcome">
      <div class="welcome-logo">ORION</div>
      <h2>Messenger P2P</h2>
      <div class="step"><div class="step-n">🚀 Étape 1</div><div class="step-t">Entre un <b>code room</b> et clique <b>JOIN</b>.</div></div>
      <div class="step"><div class="step-n">🔗 Étape 2</div><div class="step-t">Partage le lien :<br><span id="share-link" style="color:var(--p3);font-family:var(--mono);font-size:10px;">Entre un code room…</span></div></div>
      <div class="step"><div class="step-n">💬 Étape 3</div><div class="step-t">Ton contact rejoint → <b>chat direct</b>, chiffré, zéro serveur.</div></div>
    </div>
  </div>
</div>
<script>
let myPeer=null,myId=null,myNode=null,roomId=null;
let peers=new Map(),activePid=null,msgCount=0;
let coordPeer=null,coordConn=null,isCoord=false,members=[],joining=false;
let coordId=null;

async function init(){
  myNode=await makeNode();
  myId='o-'+Math.random().toString(36).substring(2,8);
  myPeer=new Peer(myId,{host:'0.peerjs.com',port:443,path:'/',secure:true,
    config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  myPeer.on('open',id=>{
    myId=id;
    document.getElementById('my-peer-display').textContent=id;
    setNet('green','Connecté ✨');
    const r=new URLSearchParams(location.search).get('room');
    if(r){document.getElementById('room-input').value=r.toUpperCase();joinRoom();}
  });
  myPeer.on('connection',conn=>handleIncoming(conn));
  myPeer.on('error',e=>setNet('red','Erreur: '+e.type));
  myPeer.on('disconnected',()=>{setNet('amber','Reconnexion…');setTimeout(()=>{try{myPeer.reconnect();}catch(e){}},2000);});
}

function joinRoom(){
  const val=document.getElementById('room-input').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(!val||val.length<2){alert('Code trop court !');return;}
  if(!myId){setTimeout(joinRoom,500);return;}
  roomId=val;coordId='orion-'+val.toLowerCase();
  history.replaceState({},'','?room='+val);
  document.getElementById('share-link').textContent=location.href;
  setNet('amber','Connexion room '+val+'…');
  joining=true;attemptJoin();
}

function attemptJoin(){
  const c=myPeer.connect(coordId,{reliable:true});
  let opened=false;
  c.on('open',()=>{
    opened=true;coordConn=c;isCoord=false;
    setNet('green','Room '+roomId+' rejointe 🎉');
    c.send(JSON.stringify({type:'hello',from:myId}));
    c.on('data',raw=>onCoordMsg(raw));
    c.on('close',()=>{coordConn=null;setTimeout(attemptJoin,1500);});
  });
  c.on('error',()=>{if(!opened)becomeCoord();});
  setTimeout(()=>{if(!opened&&joining)becomeCoord();},3000);
}

function becomeCoord(){
  if(isCoord||coordPeer)return;
  isCoord=true;members=[myId];
  coordPeer=new Peer(coordId,{host:'0.peerjs.com',port:443,path:'/',secure:true,
    config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}});
  coordPeer.on('open',()=>{setNet('green','Room '+roomId+' créée 🔥');updateSbInfo();});
  coordPeer.on('connection',conn=>{
    conn.on('open',()=>{});
    conn.on('data',raw=>{
      try{
        const d=JSON.parse(raw);
        if(d.type==='hello'&&d.from){
          const np=d.from;
          const existing=members.filter(id=>id!==myId);
          conn.send(JSON.stringify({type:'members',list:existing}));
          members.forEach(mid=>{
            if(mid!==myId&&mid!==np){
              const p=peers.get(mid);
              if(p&&p.conn&&p.conn.open)p.conn.send(JSON.stringify({type:'new-peer',pid:np}));
            }
          });
          if(!members.includes(np))members.push(np);
          connectTo(np);
        }
      }catch(e){}
    });
  });
  coordPeer.on('error',e=>{if(e.type==='unavailable-id'){isCoord=false;coordPeer=null;setTimeout(attemptJoin,300);}});
}

function onCoordMsg(raw){
  try{
    const d=JSON.parse(raw);
    if(d.type==='members')(d.list||[]).forEach(pid=>{if(pid!==myId)connectTo(pid);});
    if(d.type==='new-peer'&&d.pid&&d.pid!==myId)connectTo(d.pid);
  }catch(e){}
}

function connectTo(pid){
  if(!pid||pid===myId)return;
  const ex=peers.get(pid);
  if(ex&&ex.online)return;
  if(!ex)peers.set(pid,mkPeer(pid));
  attachConn(pid,myPeer.connect(pid,{reliable:true}));
}

function handleIncoming(conn){
  const pid=conn.peer;
  if(!peers.has(pid))peers.set(pid,mkPeer(pid));
  const ex=peers.get(pid);
  if(ex.conn&&ex.conn.open&&myId<pid){conn.close();return;}
  attachConn(pid,conn);
}

function mkPeer(pid){return{conn:null,name:'@'+pid.substring(0,6),pub:'',msgs:[],online:false,unread:0};}

function attachConn(pid,conn){
  const p=peers.get(pid);if(!p)return;
  p.conn=conn;
  conn.on('open',()=>{
    p.online=true;
    conn.send(JSON.stringify({type:'hi',pub:myNode.pub,name:'@'+myId.substring(0,6)}));
    renderPeersList();
    if(activePid===pid)renderChatHeader(pid);
    sysMsg(pid,'🔗 Connexion établie — P2P direct');
    setNet('green','Room '+roomId+' · '+countOnline()+' connecté(s) 💜');
    updateSbInfo();
    if(peers.size===1&&!activePid)openChat(pid);
  });
  conn.on('data',raw=>onData(pid,raw));
  conn.on('close',()=>{
    p.online=false;p.conn=null;renderPeersList();
    if(activePid===pid)renderChatHeader(pid);
    sysMsg(pid,'💔 Déconnecté');
    setTimeout(()=>{const pp=peers.get(pid);if(pp&&!pp.online)connectTo(pid);},3000);
  });
  conn.on('error',()=>{const pp=peers.get(pid);if(pp){pp.online=false;pp.conn=null;}renderPeersList();});
}

async function onData(pid,raw){
  let d;try{d=JSON.parse(raw);}catch(e){return;}
  const p=peers.get(pid);if(!p)return;
  if(d.type==='hi'){p.pub=d.pub||'';p.name=d.name||p.name;renderPeersList();if(activePid===pid)renderChatHeader(pid);return;}
  if(d.type==='new-peer'&&d.pid){connectTo(d.pid);return;}
  if(d.type==='msg'){
    const valid=await verify(d,p.pub);
    const msg={from:'them',text:d.text,ts:d.ts||Date.now(),valid};
    p.msgs.push(msg);msgCount++;
    if(activePid!==pid){p.unread++;renderPeersList();}
    else{appendMsg(msg);scrollBottom();}
    updateSbInfo();
  }
}

async function sendMessage(){
  if(!activePid)return;
  const ta=document.getElementById('msg-input');if(!ta)return;
  const text=ta.value.trim();if(!text)return;
  ta.value='';ta.style.height='auto';
  const p=peers.get(activePid);
  if(!p||!p.conn||!p.conn.open){sysMsg(activePid,'⚠ Canal fermé');return;}
  const sig=await sign(text);
  p.conn.send(JSON.stringify({type:'msg',text,ts:Date.now(),sig}));
  const msg={from:'me',text,ts:Date.now(),valid:true};
  p.msgs.push(msg);msgCount++;
  appendMsg(msg);scrollBottom();updateSbInfo();
}

async function makeNode(){
  try{const kp=await crypto.subtle.generateKey({name:'Ed25519'},true,['sign','verify']);
    const raw=await crypto.subtle.exportKey('raw',kp.publicKey);
    return{kp,pub:h(raw),fb:false};}
  catch(e){return{fb:true,pub:h(crypto.getRandomValues(new Uint8Array(32)))};}
}
async function sign(text){
  if(myNode.fb)return h(crypto.getRandomValues(new Uint8Array(32)));
  try{return h(await crypto.subtle.sign({name:'Ed25519'},myNode.kp.privateKey,enc(text)));}
  catch(e){return h(crypto.getRandomValues(new Uint8Array(32)));}
}
async function verify(d,pub){
  if(!pub||!d.sig||myNode.fb)return true;
  try{const k=await crypto.subtle.importKey('raw',dh(pub),{name:'Ed25519'},false,['verify']);
    return await crypto.subtle.verify({name:'Ed25519'},k,dh(d.sig),enc(d.text));}
  catch(e){return false;}
}

function openChat(pid){
  activePid=pid;const p=peers.get(pid);if(!p)return;
  p.unread=0;renderPeersList();
  document.getElementById('chat-area').innerHTML=`
    <div class="chat-header">
      <div class="avatar">${p.name.substring(0,2).toUpperCase()}</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="ch-name">${esc(p.name)}</div>
        <div class="chat-header-sub" id="ch-sub">connexion…</div>
      </div>
    </div>
    <div class="messages" id="msg-list"><div class="sys">🔒 Chiffré E2E · P2P direct</div></div>
    <div class="chat-input">
      <textarea id="msg-input" placeholder="Message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send" onclick="sendMessage()">➤</button>
    </div>`;
  p.msgs.forEach(m=>appendMsg(m));scrollBottom();renderChatHeader(pid);
  document.getElementById('msg-input').focus();
}

function renderChatHeader(pid){
  const p=peers.get(pid);
  const n=document.getElementById('ch-name'),s=document.getElementById('ch-sub');
  if(!n||!s||!p)return;
  n.textContent=p.name;
  s.textContent=p.online?'🟢 En ligne · P2P direct':'🔴 Hors ligne';
}
function appendMsg(msg){
  const el=document.getElementById('msg-list');if(!el)return;
  const isMe=msg.from==='me';
  const d=document.createElement('div');d.className='bwrap '+(isMe?'me':'them');
  d.innerHTML=`<div class="bubble">${esc(msg.text)}</div>
    <div class="bmeta"><span>${ft(msg.ts)}</span>${isMe?'<span class="tick">✓✓</span>':''}
    <span class="chip ${msg.valid===false?'bad':'ok'}">${msg.valid===false?'⚠':'✓'}</span>
    <span class="chip p2p">P2P</span></div>`;
  el.appendChild(d);
}
function sysMsg(pid,text){
  if(activePid!==pid)return;
  const el=document.getElementById('msg-list');if(!el)return;
  const d=document.createElement('div');d.className='sys';d.textContent=text;
  el.appendChild(d);scrollBottom();
}
function scrollBottom(){const e=document.getElementById('msg-list');if(e)e.scrollTop=e.scrollHeight;}
function renderPeersList(){
  const el=document.getElementById('peers-list');
  if(peers.size===0){el.innerHTML=`<div style="padding:16px;font-size:11px;color:var(--muted);text-align:center;line-height:2;">${roomId?'En attente<br>room <b style="color:var(--p3)">'+roomId+'</b> 🔥':'Rejoins une room<br>pour chatter 🔥'}</div>`;return;}
  el.innerHTML='';
  for(const[pid,p]of peers){
    const last=p.msgs[p.msgs.length-1];
    el.innerHTML+=`<div class="peer-item ${activePid===pid?'active':''}" onclick="openChat('${esc(pid)}')">
      <div class="avatar">${p.name.substring(0,2).toUpperCase()}</div>
      <div class="peer-info"><div class="peer-name">${esc(p.name)}</div>
      <div class="peer-sub">${p.online?'🟢 en ligne':'🔴 hors ligne'}${last?' · '+esc(last.text.substring(0,14)):''}</div></div>
      ${p.unread?`<div class="unread-badge">${p.unread}</div>`:''}</div>`;
  }
}
function updateSbInfo(){
  document.getElementById('sb-info').innerHTML=
    `Room : ${roomId||'—'}<br>Pairs : ${peers.size} (${countOnline()} 🟢)<br>Msgs : ${msgCount}`;
}
function countOnline(){let n=0;for(const p of peers.values())if(p.online)n++;return n;}
function setNet(s,t){
  const d=document.getElementById('net-dot');
  d.className='ndot'+(s==='green'?' green':s==='amber'?' amber':s==='red'?' red':'');
  document.getElementById('net-txt').textContent=t;
}
function enc(s){return new TextEncoder().encode(s);}
function h(b){return Array.from(new Uint8Array(b instanceof ArrayBuffer?b:b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function dh(s){const b=new Uint8Array(s.length/2);for(let i=0;i<s.length;i+=2)b[i/2]=parseInt(s.substr(i,2),16);return b.buffer;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ft(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
init();
</script>
</body>
</html>
